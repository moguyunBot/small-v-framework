{extend name="$base_admin"}
{block name="main"}
<div class="card">
    <div class="card-header">
        <h4>个人信息</h4>
    </div>
    <div class="card-body">
        <form @submit.prevent="submit">
            <div class="mb-3">
                <label class="form-label">用户名</label>
                <input type="text" class="form-control" v-model="form.username" disabled>
                <small class="form-text text-muted">用户名不可修改</small>
            </div>
            <div class="mb-3">
                <label class="form-label">昵称 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" required v-model="form.nickname">
            </div>
            <div class="mb-3">
                <label class="form-label">邮箱</label>
                <input type="email" class="form-control" v-model="form.email">
            </div>
            <button type="submit" class="btn btn-primary">保存修改</button>
            <a href="/admin/admin/index" class="btn btn-default">返回</a>
        </form>
    </div>
</div>
{/block}
{block name="script"}
<script>
    createVueApp({
        data() {
            return {
                form: {
                    username:'{$admin.username}',
                    nickname: '{$admin.nickname}',
                    email: '{$admin.email|default=""}'
                }
            };
        }
    }).mount('#app');
</script>
{/block}
