{extend name="base"}
{block name="head"}
<link rel="stylesheet" href="/static/jstree/themes/default/style.css">
<style>
.plugin-card {
    border: 1px solid #e3e6f0;
    border-radius: 0.35rem;
    margin-bottom: 1rem;
}
.plugin-card .card-header {
    background-color: #f8f9fc;
    padding: 0.75rem 1rem;
    border-bottom: 1px solid #e3e6f0;
}
.plugin-card .card-body {
    padding: 1rem;
}
.permission-tree {
    min-height: 200px;
    max-height: 400px;
    overflow-y: auto;
    border: 1px solid #ddd;
    padding: 10px;
    border-radius: 4px;
}
</style>
{/block}

{block name="main"}
<div class="row">
    <div class="col-lg-12">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">添加角色</h5>
            </div>
            <div class="card-body">
                <form @submit.prevent="submit1">
                    <div class="mb-3">
                        <label class="form-label">角色名称</label>
                        <input type="text" class="form-control" required v-model="form.name">
                    </div>
                    
                    <!-- 系统权限 -->
                    <div class="mb-4">
                        <label class="form-label d-flex justify-content-between align-items-center">
                            <span><i class="mdi mdi-shield-account"></i> 后台权限</span>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="checkAllSystem" @change="toggleAllSystem">
                                <label class="form-check-label" for="checkAllSystem">全选</label>
                            </div>
                        </label>
                        <div ref="systemTree" class="permission-tree"></div>
                    </div>
                    
                    <!-- 插件权限 -->
                    <div class="mb-4" v-if="hasPluginRules">
                        <label class="form-label">
                            <i class="mdi mdi-puzzle"></i> 插件权限
                        </label>
                        <div class="row">
                            {foreach $pluginRules as $plugin => $group}
                            <div class="col-md-6 col-lg-4 mb-3">
                                <div class="plugin-card">
                                    <div class="card-header d-flex align-items-center">
                                        <i class="{$group.icon} me-2"></i>
                                        <span>{$group.name}</span>
                                    </div>
                                    <div class="card-body">
                                        <div ref="pluginTree_{$plugin}" class="permission-tree" style="min-height: 150px; max-height: 250px;"></div>
                                    </div>
                                </div>
                            </div>
                            {/foreach}
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">状态</label>
                        <select class="form-control form-select" v-model="form.status">
                            <option value="1">正常</option>
                            <option value="0">禁用</option>
                        </select>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="/admin/role/index" class="btn btn-secondary">返回</a>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{/block}

{block name="script"}
<script src="/static/jstree/jstree.js"></script>
<script>
    createVueApp({
        data() {
            return {
                form: {
                    name: '',
                    rules: [],
                    status: 1
                },
                systemRules: JSON.parse('{:json_encode($systemRules)}'),
                pluginRules: JSON.parse('{:json_encode($pluginRules)}'),
                systemTree: null,
                pluginTrees: {}
            };
        },
        computed: {
            hasPluginRules() {
                return Object.keys(this.pluginRules).length > 0;
            }
        },
        mounted() {
            // 初始化系统权限树
            this.initSystemTree();
            
            // 初始化插件权限树
            this.initPluginTrees();
        },
        methods: {
            initSystemTree() {
                this.systemTree = $(this.$refs.systemTree).jstree({
                    core: {
                        data: this.systemRules,
                        themes: {
                            icons: false
                        }
                    },
                    plugins: ['checkbox'],
                    checkbox: {
                        three_state: true,
                        cascade: 'up+down'
                    }
                });
            },
            initPluginTrees() {
                for (let plugin in this.pluginRules) {
                    let rules = this.pluginRules[plugin].rules;
                    // 转换为 jstree 格式
                    let treeData = rules.map(r => ({
                        id: r.id,
                        parent: r.pid ? r.pid : '#',
                        text: r.title,
                        state: { selected: false }
                    }));
                    
                    let tree = $(this.$refs['pluginTree_' + plugin]).jstree({
                        core: {
                            data: treeData,
                            themes: {
                                icons: false
                            }
                        },
                        plugins: ['checkbox'],
                        checkbox: {
                            three_state: true,
                            cascade: 'up+down'
                        }
                    });
                    
                    this.pluginTrees[plugin] = tree;
                }
            },
            toggleAllSystem(e) {
                if (e.target.checked) {
                    this.systemTree.jstree('check_all');
                } else {
                    this.systemTree.jstree('uncheck_all');
                }
            },
            submit1(e) {
                // 收集系统权限
                let systemChecked = this.systemTree.jstree('get_checked');
                let systemUndetermined = this.systemTree.jstree('get_undetermined');
                let allRules = systemChecked.concat(systemUndetermined);
                
                // 收集插件权限
                for (let plugin in this.pluginTrees) {
                    let tree = this.pluginTrees[plugin];
                    let checked = tree.jstree('get_checked');
                    let undetermined = tree.jstree('get_undetermined');
                    allRules = allRules.concat(checked, undetermined);
                }
                
                // 去重
                this.form.rules = [...new Set(allRules)];
                
                this.submit(e);
            }
        }
    }).mount('#app');
</script>
{/block}
