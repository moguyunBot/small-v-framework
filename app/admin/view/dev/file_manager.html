{extend name="base"}
{block name="main"}

<div class="row" id="app">
  <div class="col-lg-12">
    <div class="card">
      <div class="card-header">
        <h5 class="mb-0"><i class="mdi mdi-folder"></i> 文件管理器</h5>
      </div>
      <div class="card-body">
        <!-- 路径导航 -->
        <div class="mb-3">
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-0">
              <li class="breadcrumb-item">
                <a href="javascript:void(0)" @click="loadFiles('')">
                  <i class="mdi mdi-home"></i> 根目录
                </a>
              </li>
              <li class="breadcrumb-item" v-for="(part, index) in pathParts" :key="index">
                <a href="javascript:void(0)" @click="loadFiles(getPathByIndex(index))">{{ part }}</a>
              </li>
            </ol>
          </nav>
        </div>
        
        <!-- 操作按钮 -->
        <div class="mb-3">
          <button class="btn btn-sm btn-primary" @click="showCreateDirModal">
            <i class="mdi mdi-folder-plus"></i> 新建文件夹
          </button>
          <button class="btn btn-sm btn-secondary" @click="loadFiles(currentPath)">
            <i class="mdi mdi-refresh"></i> 刷新
          </button>
        </div>
        
        <!-- 文件列表 -->
        <div class="table-responsive">
          <table class="table table-hover">
            <thead>
              <tr>
                <th width="50%">名称</th>
                <th>大小</th>
                <th>修改时间</th>
                <th width="200">操作</th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="file in files" :key="file.path">
                <td>
                  <i class="mdi" :class="file.is_dir ? 'mdi-folder text-warning' : 'mdi-file-document text-primary'"></i>
                  <a v-if="file.is_dir" href="javascript:void(0)" @click="loadFiles(file.path)">
                    {{ file.name }}
                  </a>
                  <span v-else>{{ file.name }}</span>
                  <span v-if="!file.can_edit && !file.is_dir" class="badge bg-secondary ms-2">只读</span>
                  <span v-if="!file.can_delete" class="badge bg-warning ms-2">受保护</span>
                </td>
                <td>{{ file.size_format }}</td>
                <td>{{ file.mtime_format }}</td>
                <td>
                  <div class="btn-group btn-group-sm">
                    <button v-if="!file.is_dir && file.can_edit" class="btn btn-info" @click="editFile(file.path)">
                      <i class="mdi mdi-pencil"></i> 编辑
                    </button>
                    <button v-if="!file.is_dir" class="btn btn-success" @click="downloadFile(file.path)">
                      <i class="mdi mdi-download"></i> 下载
                    </button>
                    <button v-if="file.can_delete" class="btn btn-danger" @click="deleteFile(file.path)">
                      <i class="mdi mdi-delete"></i> 删除
                    </button>
                  </div>
                </td>
              </tr>
              <tr v-if="files.length === 0">
                <td colspan="4" class="text-center text-muted">空文件夹</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 文件编辑器模态框 -->
<div class="modal fade" id="editorModal" tabindex="-1">
  <div class="modal-dialog modal-xl">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">编辑文件: {{ editingFile }}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <textarea class="form-control" v-model="fileContent" rows="20" style="font-family: 'Courier New', monospace; font-size: 13px;"></textarea>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn btn-primary" @click="saveFile">
          <i class="mdi mdi-content-save"></i> 保存
        </button>
      </div>
    </div>
  </div>
</div>

<!-- 新建文件夹模态框 -->
<div class="modal fade" id="createDirModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">新建文件夹</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">文件夹名称</label>
          <input type="text" class="form-control" v-model="newDirName" placeholder="输入文件夹名称">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn btn-primary" @click="createDir">
          <i class="mdi mdi-folder-plus"></i> 创建
        </button>
      </div>
    </div>
  </div>
</div>

{/block}

{block name="script"}
<script>
createVueApp({
  data() {
    return {
      currentPath: '',
      files: [],
      editingFile: '',
      fileContent: '',
      newDirName: '',
      editorModal: null,
      createDirModal: null
    };
  },
  computed: {
    pathParts() {
      if (!this.currentPath) return [];
      return this.currentPath.split('/').filter(p => p);
    }
  },
  mounted() {
    this.loadFiles('');
    
    // 初始化模态框
    this.editorModal = new bootstrap.Modal(document.getElementById('editorModal'));
    this.createDirModal = new bootstrap.Modal(document.getElementById('createDirModal'));
  },
  methods: {
    async loadFiles(path) {
      const loading = layer.load();
      
      try {
        const res = await this.postAsync('fileManager', {
          action: 'list',
          path: path
        });
        
        layer.close(loading);
        
        if (res.code === 0) {
          this.currentPath = res.data.current_path;
          this.files = res.data.files;
        } else {
          layer.msg(res.msg || '加载失败', { icon: 2 });
        }
      } catch (e) {
        layer.close(loading);
        layer.msg('加载失败: ' + e.message, { icon: 2 });
      }
    },
    
    getPathByIndex(index) {
      return this.pathParts.slice(0, index + 1).join('/');
    },
    
    async editFile(file) {
      const loading = layer.load();
      
      try {
        const res = await this.postAsync('fileManager', {
          action: 'read',
          file: file
        });
        
        layer.close(loading);
        
        if (res.code === 0) {
          this.editingFile = file;
          this.fileContent = res.data.content;
          this.editorModal.show();
        } else {
          layer.msg(res.msg || '读取失败', { icon: 2 });
        }
      } catch (e) {
        layer.close(loading);
        layer.msg('读取失败: ' + e.message, { icon: 2 });
      }
    },
    
    async saveFile() {
      const loading = layer.load();
      
      try {
        const res = await this.postAsync('fileManager', {
          action: 'save',
          file: this.editingFile,
          content: this.fileContent
        });
        
        layer.close(loading);
        
        if (res.code === 1) {
          layer.msg(res.msg, { icon: 1 });
          this.editorModal.hide();
          this.loadFiles(this.currentPath);
        } else {
          layer.msg(res.msg || '保存失败', { icon: 2 });
        }
      } catch (e) {
        layer.close(loading);
        layer.msg('保存失败: ' + e.message, { icon: 2 });
      }
    },
    
    async deleteFile(path) {
      this.confirm('确定要删除吗？此操作不可恢复！', async () => {
        const loading = layer.load();
        
        try {
          const res = await this.postAsync('fileManager', {
            action: 'delete',
            path: path
          });
          
          layer.close(loading);
          
          if (res.code === 1) {
            layer.msg(res.msg, { icon: 1 });
            this.loadFiles(this.currentPath);
          } else {
            layer.msg(res.msg || '删除失败', { icon: 2 });
          }
        } catch (e) {
          layer.close(loading);
          layer.msg('删除失败: ' + e.message, { icon: 2 });
        }
      });
    },
    
    showCreateDirModal() {
      this.newDirName = '';
      this.createDirModal.show();
    },
    
    async createDir() {
      if (!this.newDirName.trim()) {
        layer.msg('请输入文件夹名称', { icon: 0 });
        return;
      }
      
      const loading = layer.load();
      
      try {
        const res = await this.postAsync('fileManager', {
          action: 'create_dir',
          path: this.currentPath,
          name: this.newDirName
        });
        
        layer.close(loading);
        
        if (res.code === 1) {
          layer.msg(res.msg, { icon: 1 });
          this.createDirModal.hide();
          this.loadFiles(this.currentPath);
        } else {
          layer.msg(res.msg || '创建失败', { icon: 2 });
        }
      } catch (e) {
        layer.close(loading);
        layer.msg('创建失败: ' + e.message, { icon: 2 });
      }
    },
    
    downloadFile(file) {
      // 创建隐藏表单提交下载请求
      const form = document.createElement('form');
      form.method = 'POST';
      form.action = '/admin/dev/fileManager';
      form.target = '_blank';
      
      const actionInput = document.createElement('input');
      actionInput.type = 'hidden';
      actionInput.name = 'action';
      actionInput.value = 'download';
      form.appendChild(actionInput);
      
      const fileInput = document.createElement('input');
      fileInput.type = 'hidden';
      fileInput.name = 'file';
      fileInput.value = file;
      form.appendChild(fileInput);
      
      document.body.appendChild(form);
      form.submit();
      document.body.removeChild(form);
    },
    
    postAsync(url, data) {
      return new Promise((resolve, reject) => {
        this.post(url, data, (res) => {
          resolve(res);
        });
      });
    }
  }
}).mount('#app');
</script>
{/block}
