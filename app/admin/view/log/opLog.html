{extend name="base"}
{block name="main"}
<div class="card">
  <div class="card-header d-flex justify-content-between align-items-center">
    <h5 class="mb-0"><i class="mdi mdi-clipboard-list me-1"></i> 操作日志</h5>
    <button class="btn btn-sm btn-outline-danger" onclick="clearLog()"><i class="mdi mdi-delete"></i> 清空日志</button>
  </div>
  <div class="card-body">
    <form class="row g-2 mb-3" method="get">
      <div class="col-auto">
        <input type="text" class="form-control form-control-sm" name="keyword" value="{$keyword}" placeholder="搜索用户名">
      </div>
      <div class="col-auto">
        <button type="submit" class="btn btn-sm btn-primary">搜索</button>
      </div>
    </form>
    <div class="table-responsive">
      <table class="table table-hover table-sm align-middle">
        <thead class="table-light">
          <tr>
            <th>ID</th>
            <th>用户名</th>
            <th>请求路径</th>
            <th>方法</th>
            <th>参数</th>
            <th>IP</th>
            <th>时间</th>
          </tr>
        </thead>
        <tbody>
          {foreach $logs as $log}
          <tr>
            <td>{$log.id}</td>
            <td>{$log.username}</td>
            <td>{$log.path}</td>
            <td><span class="badge bg-secondary">{$log.method}</span></td>
            <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px;color:#999" title="{$log.params}">{$log.params}</td>
            <td>{$log.ip}</td>
            <td>{$log.create_time|date='Y-m-d H:i:s'}</td>
          </tr>
          {/foreach}
        </tbody>
      </table>
    </div>
    <div class="mt-2">{$logs|raw}</div>
  </div>
</div>
{/block}
{block name="script"}
<script>
const _app = createVueApp({});
const _vm = _app.mount('#app');
function clearLog() {
  _vm.confirm('确定要清空所有操作日志吗？此操作不可撤销！', () => {
    _vm.post('/admin/log/clearOpLog', {}, res => {
      _vm.alert(res, () => { if(res.code==1) location.reload(); });
    });
  });
}
</script>
{/block}
