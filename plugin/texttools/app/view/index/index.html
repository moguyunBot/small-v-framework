<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>文本处理工具</title><link rel="icon" href="/favicon.svg"><link rel="stylesheet" href="/app/nettools/static/css/style.css"></head>
<body><div class="container"><a href="/" class="back-link">← 返回首页</a><div class="header"><h1>📝 文本处理工具</h1><p>文本对比、字数统计、大小写转换、去重</p></div><div class="tools-grid">
<div class="tool-card"><h3>文本对比</h3><textarea class="form-control" id="diff1" rows="3" placeholder="文本1"></textarea><textarea class="form-control" id="diff2" rows="3" placeholder="文本2" style="margin-top:10px"></textarea><button class="btn btn-primary" style="margin-top:10px" onclick="doDiff()">对比</button><div class="result-box" id="diffResult"></div></div>
<div class="tool-card"><h3>字数统计</h3><textarea class="form-control" id="countText" rows="4" placeholder="输入文本"></textarea><button class="btn btn-primary" style="margin-top:10px" onclick="doCount()">统计</button><div class="result-box" id="countResult"></div></div>
<div class="tool-card"><h3>大小写转换</h3><textarea class="form-control" id="caseText" rows="4" placeholder="输入文本"></textarea><div style="margin-top:10px"><button class="btn btn-primary" onclick="doCase('upper')">转大写</button> <button class="btn btn-primary" onclick="doCase('lower')">转小写</button></div><div class="result-box" id="caseResult"></div></div>
<div class="tool-card"><h3>文本去重</h3><textarea class="form-control" id="uniqueText" rows="4" placeholder="每行一条数据"></textarea><button class="btn btn-primary" style="margin-top:10px" onclick="doUnique()">去重</button><div class="result-box" id="uniqueResult"></div></div>
</div></div>
<script>
async function doDiff(){const t1=document.getElementById('diff1').value,t2=document.getElementById('diff2').value;if(!t1||!t2)return layer.msg('请输入两段文本');const r=await fetch('/app/texttools/diff',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text1:t1,text2:t2})});const d=await r.json();if(d.code===0){document.getElementById('diffResult').innerHTML='<pre>'+d.data.diff+'</pre>';document.getElementById('diffResult').classList.add('show');}else alert(d.msg);}
async function doCount(){const t=document.getElementById('countText').value;if(!t)return layer.msg('请输入文本');const r=await fetch('/app/texttools/count',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:t})});const d=await r.json();if(d.code===0){document.getElementById('countResult').innerHTML='<pre>字符数: '+d.data.chars+'\n单词数: '+d.data.words+'\n行数: '+d.data.lines+'</pre>';document.getElementById('countResult').classList.add('show');}else alert(d.msg);}
async function doCase(type){const t=document.getElementById('caseText').value;if(!t)return layer.msg('请输入文本');const r=await fetch('/app/texttools/case',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:t,type})});const d=await r.json();if(d.code===0){document.getElementById('caseResult').innerHTML='<pre>'+d.data.result+'</pre>';document.getElementById('caseResult').classList.add('show');}else alert(d.msg);}
async function doUnique(){const t=document.getElementById('uniqueText').value;if(!t)return layer.msg('请输入文本');const r=await fetch('/app/texttools/unique',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:t})});const d=await r.json();if(d.code===0){document.getElementById('uniqueResult').innerHTML='<pre>'+d.data.result+'</pre>';document.getElementById('uniqueResult').classList.add('show');}else alert(d.msg);}
</script><script src="/static/js/jquery.min.js"></script>
    <script src="/static/layer/layer.js"></script>
</body></html>
