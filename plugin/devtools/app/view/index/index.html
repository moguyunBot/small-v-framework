<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>开发者工具</title><link rel="icon" href="/favicon.svg"><link rel="stylesheet" href="/app/nettools/static/css/style.css"></head>
<body><div class="container"><a href="/" class="back-link">← 返回首页</a><div class="header"><h1>⚙️ 开发者工具</h1><p>时间戳转换、UUID生成、随机密码、颜色生成</p></div><div class="tools-grid">
<div class="tool-card"><h3>时间戳转换</h3><button class="btn btn-primary" onclick="getNow()">获取当前时间戳</button><input type="number" class="form-control" id="tsInput" placeholder="输入时间戳" style="margin-top:10px"><button class="btn btn-primary" style="margin-top:10px" onclick="convertTs()">转换为日期</button><div class="result-box" id="tsResult"></div></div>
<div class="tool-card"><h3>UUID 生成器</h3><button class="btn btn-primary" onclick="genUuid()">生成 UUID</button><div class="result-box" id="uuidResult"></div></div>
<div class="tool-card"><h3>随机密码生成</h3><input type="number" class="form-control" id="pwdLength" value="16" min="6" max="32"><button class="btn btn-primary" style="margin-top:10px" onclick="genPassword()">生成密码</button><div class="result-box" id="pwdResult"></div></div>
<div class="tool-card"><h3>随机颜色</h3><button class="btn btn-primary" onclick="genColor()">生成颜色</button><div class="result-box" id="colorResult"></div></div>
</div></div>
<script>
async function getNow(){const r=await fetch('/app/devtools/timestamp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'now'})});const d=await r.json();if(d.code===0){document.getElementById('tsResult').innerHTML='<pre>时间戳: '+d.data.timestamp+'\n日期时间: '+d.data.datetime+'</pre>';document.getElementById('tsResult').classList.add('show');}}
async function convertTs(){const ts=document.getElementById('tsInput').value;if(!ts)return layer.msg('请输入时间戳');const r=await fetch('/app/devtools/timestamp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'convert',timestamp:ts})});const d=await r.json();if(d.code===0){document.getElementById('tsResult').innerHTML='<pre>'+d.data.datetime+'</pre>';document.getElementById('tsResult').classList.add('show');}}
async function genUuid(){const r=await fetch('/app/devtools/uuid',{method:'POST'});const d=await r.json();if(d.code===0){document.getElementById('uuidResult').innerHTML='<pre>'+d.data.uuid+'</pre>';document.getElementById('uuidResult').classList.add('show');}}
async function genPassword(){const len=document.getElementById('pwdLength').value;const r=await fetch('/app/devtools/password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({length:len})});const d=await r.json();if(d.code===0){document.getElementById('pwdResult').innerHTML='<pre>'+d.data.password+'</pre>';document.getElementById('pwdResult').classList.add('show');}}
async function genColor(){const r=await fetch('/app/devtools/color',{method:'POST'});const d=await r.json();if(d.code===0){document.getElementById('colorResult').innerHTML='<div style="background:'+d.data.color+';width:100px;height:100px;border-radius:8px;margin:10px auto"></div><pre>'+d.data.color+'</pre>';document.getElementById('colorResult').classList.add('show');}}
</script><script src="/static/js/jquery.min.js"></script>
    <script src="/static/layer/layer.js"></script>
</body></html>
