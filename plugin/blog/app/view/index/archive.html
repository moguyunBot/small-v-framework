{extend name="layout"}
{block name="title"}归档 - {:get_config('blog.blog_title') ?: '博客'}{/block}
{block name="content"}
<h2 style="margin-bottom:20px">文章归档</h2>
{volist name="archives" id="posts" key="ym"}
<h3 style="margin:20px 0 10px;color:#555;font-size:1rem">{$ym}</h3>
{volist name="posts" id="p"}
<div style="padding:6px 0;border-bottom:1px solid #f0ede9">
  <span style="color:#aaa;font-size:.85rem;margin-right:10px">{$p.create_time|date='m-d'}</span>
  <a href="/blog/post/{$p.slug}">{$p.title}</a>
</div>
{/volist}
{/volist}
{/block}
