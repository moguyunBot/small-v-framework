{extend name="$base_template"}
{block name="main"}
<div class="row">
  <div class="col-lg-12">
    <div class="card">
      <div class="card-body">
        <div class="card-btns mb-2-5">
          <a class="btn btn-sm btn-primary me-1" href="add"><i class="mdi mdi-plus"></i> 写文章</a>
        </div>
        <form class="row g-2 mb-3" method="get">
          <div class="col-auto"><input type="text" name="keyword" class="form-control form-control-sm" placeholder="搜索标题" value="{$keyword}"></div>
          <div class="col-auto">
            <select name="status" class="form-select form-select-sm">
              <option value="">全部状态</option>
              <option value="1" {if $status=='1'}selected{/if}>已发布</option>
              <option value="0" {if $status=='0'}selected{/if}>草稿</option>
            </select>
          </div>
          <div class="col-auto"><button class="btn btn-sm btn-outline-secondary" type="submit">搜索</button></div>
        </form>
        <div class="table-responsive">
          <table class="table table-bordered">
            <thead><tr><th>标题</th><th>分类</th><th>状态</th><th>浏览</th><th>发布时间</th><th>操作</th></tr></thead>
            <tbody>
            {foreach $posts as $p}
            <tr>
              <td>{if $p.is_top}<span class="badge bg-danger me-1">置顶</span>{/if}{$p.title}</td>
              <td>{$p.category.name|default='未分类'}</td>
              <td>{$p.status ? '<font class="text-success">已发布</font>' : '<font class="text-warning">草稿</font>'}</td>
              <td>{$p.view_count}</td>
              <td>{$p.create_time}</td>
              <td>
                <div class="btn-group btn-group-sm">
                  <a class="btn btn-default" href="edit?id={$p.id}">编辑</a>
                  <button class="btn btn-default" @click="del({$p.id})">删除</button>
                </div>
              </td>
            </tr>
            {/foreach}
            </tbody>
          </table>
        </div>
        {$posts|raw}
      </div>
    </div>
  </div>
</div>
{/block}
{block name="script"}
<script>
createVueApp({}).mount('#app');
</script>
{/block}
