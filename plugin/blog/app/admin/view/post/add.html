{extend name="$base_template"}
{block name="main"}
<div class="card">
  <div class="card-body">
    <form @submit.prevent="submit">
      <div class="mb-3">
        <label class="form-label">文章标题</label>
        <input type="text" class="form-control" required v-model="form.title">
      </div>
      <div class="mb-3">
        <label class="form-label">摘要</label>
        <textarea class="form-control" rows="2" v-model="form.summary"></textarea>
      </div>
      <div class="mb-3">
        <label class="form-label">正文内容</label>
        <textarea class="form-control" rows="15" v-model="form.content"></textarea>
      </div>
      <div class="row">
        <div class="col-md-4 mb-3">
          <label class="form-label">分类</label>
          <select class="form-control form-select" v-model="form.category_id">
            <option value="0">未分类</option>
            {foreach $categories as $c}<option value="{$c.id}">{$c.name}</option>{/foreach}
          </select>
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label">状态</label>
          <select class="form-control form-select" v-model="form.status">
            <option value="1">发布</option>
            <option value="0">草稿</option>
          </select>
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label">置顶</label>
          <select class="form-control form-select" v-model="form.is_top">
            <option value="0">否</option>
            <option value="1">是</option>
          </select>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">标签</label>
        <div>
          {foreach $tags as $t}
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="checkbox" value="{$t.id}" id="tag{$t.id}" v-model="form.tag_ids">
            <label class="form-check-label" for="tag{$t.id}">{$t.name}</label>
          </div>
          {/foreach}
        </div>
      </div>
      <button type="submit" class="btn btn-primary">发布文章</button>
    </form>
  </div>
</div>
{/block}
{block name="script"}
<script>
createVueApp({
    data() {
        return {
            form: {
                title: '',
                summary: '',
                content: '',
                category_id: '0',
                status: '1',
                is_top: '0',
                tag_ids: []
            }
        };
    }
}).mount('#app');
</script>
{/block}
