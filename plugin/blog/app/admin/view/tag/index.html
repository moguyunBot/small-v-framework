{extend name="$base_template"}
{block name="main"}
<div class="row">
  <div class="col-lg-12">
    <div class="card">
      <div class="card-body">
        <div class="card-btns mb-2-5">
          <a class="btn btn-sm btn-primary me-1" href="add"><i class="mdi mdi-plus"></i> 添加标签</a>
        </div>
        <div class="table-responsive">
          <table class="table table-bordered">
            <thead><tr><th>名称</th><th>Slug</th><th>文章数</th><th>操作</th></tr></thead>
            <tbody>
            {foreach $tags as $t}
            <tr>
              <td>{$t.name}</td>
              <td>{$t.slug}</td>
              <td>{$t.post_count}</td>
              <td>
                  <a href="edit?id={$t.id}">编辑</a>
                  <span class="text-muted mx-1">|</span>
                  <a href="javascript:void(0)" class="text-danger" @click="del({$t.id})">删除</a>
              </td>
            </tr>
            {/foreach}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
{/block}
{block name="script"}
<script>
createVueApp({}).mount('#app');
</script>
{/block}
