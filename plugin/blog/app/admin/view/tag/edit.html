{extend name="$base_template"}
{block name="main"}
<div class="card">
  <div class="card-body">
    <form @submit.prevent="submit">
      <div class="mb-3">
        <label class="form-label">标签名称</label>
        <input type="text" class="form-control" required v-model="form.name">
      </div>
      <button type="submit" class="btn btn-primary">保存</button>
    </form>
  </div>
</div>
{/block}
{block name="script"}
<script>
createVueApp({
    data() {
        return {
            form: { name: '{$tag.name}' }
        };
    }
}).mount('#app');
</script>
{/block}
