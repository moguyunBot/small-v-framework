<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>实用工具</title><link rel="icon" href="/favicon.svg"><link rel="stylesheet" href="/app/nettools/static/css/style.css"></head>
<body><div class="container"><a href="/" class="back-link">← 返回首页</a><div class="header"><h1>🔧 实用工具</h1><p>IP查询、User-Agent解析等</p></div><div class="tools-grid">
<div class="tool-card"><h3>IP 地址查询</h3><input type="text" class="form-control" id="ipInput" placeholder="输入IP地址（留空查询本机）"><button class="btn btn-primary" style="margin-top:10px" onclick="queryIp()">查询</button><div class="result-box" id="ipResult"></div></div>
<div class="tool-card"><h3>更多功能</h3><p style="color:#666">短链接生成、User-Agent解析等功能开发中...</p></div>
</div></div>
<script>
async function queryIp(){const ip=document.getElementById('ipInput').value;const r=await fetch('/app/utiltools/ip',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ip})});const d=await r.json();if(d.code===0){const info=d.data;document.getElementById('ipResult').innerHTML='<pre>IP: '+info.query+'\n国家: '+info.country+'\n地区: '+info.regionName+'\n城市: '+info.city+'\nISP: '+info.isp+'</pre>';document.getElementById('ipResult').classList.add('show');}else layer.msg('查询失败');}
</script><script src="/static/js/jquery.min.js"></script>
    <script src="/static/layer/layer.js"></script>
</body></html>
