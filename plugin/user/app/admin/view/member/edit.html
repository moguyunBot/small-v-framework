{extend name="$base_template"}
{block name="main"}
<div class="card">
  <div class="card-header"><h5 class="mb-0">编辑用户</h5></div>
  <div class="card-body">
    <form @submit.prevent="submit">
      <div class="row">
        <div class="col-md-6">
          <div class="mb-3"><label class="form-label">昵称 <span class="text-danger">*</span></label><input type="text" class="form-control" v-model="form.nickname" required></div>
          <div class="mb-3"><label class="form-label">邮箱</label><input type="email" class="form-control" v-model="form.email"></div>
          <div class="mb-3"><label class="form-label">手机号</label><input type="text" class="form-control" v-model="form.mobile"></div>
        </div>
        <div class="col-md-6">
          <div class="mb-3"><label class="form-label">密码</label><input type="password" class="form-control" v-model="form.password" placeholder="不修改请留空"></div>
          <div class="mb-3">
            <label class="form-label">状态</label>
            <select class="form-select" v-model="form.status"><option :value="1">正常</option><option :value="0">禁用</option></select>
          </div>
        </div>
      </div>
      <button type="submit" class="btn btn-primary">提交</button>
      <a href="index" class="btn btn-secondary ms-2"><i class="mdi mdi-arrow-left"></i> 返回</a>
    </form>
  </div>
</div>
{/block}
{block name="script"}
<script>
createVueApp({
  data() {
    const form = JSON.parse('{$member|json_encode|raw}');
    form.status = parseInt(form.status);
    form.password = '';
    return { form };
  }
}).mount('#app');
</script>
{/block}
